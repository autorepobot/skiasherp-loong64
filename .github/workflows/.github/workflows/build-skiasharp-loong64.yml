name: build SkiaSharp loong64

on:
  workflow_dispatch:
    inputs:
      skiasharp_ref:
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    env:
      SKIASHARP_REF: ${{ inputs.skiasharp_ref }}
      QCOW2_URL: https://github.com/xujiegb/debian-loong64-qcow2/releases/download/13.4/debian13-loong64.qcow2
      EFI_CODE_URL: https://github.com/xujiegb/debian-loong64-qcow2/releases/download/13.4/edk2-loongarch64-code.fd
      EFI_VARS_URL: https://github.com/xujiegb/debian-loong64-qcow2/releases/download/13.4/edk2-loongarch64-vars.fd
      QCOW2_IMAGE: debian13-loong64.qcow2
      EFI_CODE: edk2-loongarch64-code.fd
      EFI_VARS: edk2-loongarch64-vars.fd
      QEMU_VERSION: 10.2.2

    steps:
      - name: Prepare host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rsync qemu-utils expect wget curl ca-certificates libfdt1 libglib2.0-0 libpixman-1-0 libslirp0

      - name: Download QEMU prebuild
        shell: bash
        run: |
          set -euo pipefail
          wget -O qemu-linux-x64.tar.gz "https://github.com/xujiegb/qemu-linux-prebuild/releases/download/${QEMU_VERSION}/qemu-linux-x64.tar.gz"
          tar -xzf qemu-linux-x64.tar.gz
          mkdir -p "$HOME/qemu-install"
          rsync -a qemu-linux-x64/ "$HOME/qemu-install/"
          "$HOME/qemu-install/bin/qemu-system-loongarch64" --version

      - name: Download loong64 qcow2 and EFI firmware
        shell: bash
        run: |
          set -euo pipefail
          wget -O "$QCOW2_IMAGE" "$QCOW2_URL"
          wget -O "$EFI_CODE" "$EFI_CODE_URL"
          wget -O "$EFI_VARS" "$EFI_VARS_URL"
          qemu-img info "$QCOW2_IMAGE"

      - name: Build SkiaSharp loong64 in VM
        shell: bash
        timeout-minutes: 330
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/dist"

          expect <<'EOF'
          log_user 1
          set timeout -1

          set skiasharp_ref $env(SKIASHARP_REF)
          set qemu_bin "$env(HOME)/qemu-install/bin/qemu-system-loongarch64"
          set qemu_rom_dir "$env(HOME)/qemu-install/share/qemu"
          set workspace $env(GITHUB_WORKSPACE)
          set qcow2 $env(QCOW2_IMAGE)
          set efi_code $env(EFI_CODE)
          set efi_vars $env(EFI_VARS)

          proc wait_prompt {} {
            expect {
              -re "__CI_PROMPT__# " {}
              timeout { exit 1 }
              eof { exit 1 }
            }
          }

          proc run_cmd {cmd} {
            send -- "$cmd\r"
            wait_prompt
          }

          spawn $qemu_bin \
            -L $qemu_rom_dir \
            -machine virt \
            -accel tcg,thread=multi,tb-size=2048 \
            -cpu la464 \
            -m 8192 \
            -smp 4 \
            -drive if=pflash,format=raw,unit=0,file=$efi_code,readonly=on \
            -drive if=pflash,format=raw,unit=1,file=$efi_vars \
            -device virtio-blk-pci,drive=hd0,bootindex=1 \
            -drive if=none,media=disk,id=hd0,file=$qcow2,format=qcow2 \
            -netdev user,id=net0 \
            -device virtio-net-pci,netdev=net0 \
            -virtfs local,path=$workspace,mount_tag=workspace,security_model=none,id=workspace \
            -display none \
            -serial stdio \
            -monitor none

          expect -re "login:|debian login:"
          send -- "root\r"

          expect -re "Password:|密码:|密码："
          send -- "password\r"

          expect {
            -re "# " {}
            timeout { exit 1 }
            eof { exit 1 }
          }

          send -- "export TERM=dumb; export PS1='__CI_PROMPT__# '\r"
          wait_prompt

          run_cmd "mkdir -p /workspace"
          run_cmd "mount -t 9p -o trans=virtio,version=9p2000.L workspace /workspace || mount -t 9p -o trans=virtio workspace /workspace"
          run_cmd "IFACE=\$(ip -o link show | awk -F': ' '\$2 != \"lo\" {print \$2; exit}') ; ip link set \$IFACE up || true"
          run_cmd "dhclient \$IFACE || true"
          run_cmd "printf 'nameserver 10.0.2.3\nnameserver 1.1.1.1\n' >/etc/resolv.conf"

          run_cmd "apt-get update || apt-get update || apt-get update"
          run_cmd "DEBIAN_FRONTEND=noninteractive apt-get install -y git curl wget ca-certificates tar gzip unzip xz-utils clang ninja-build python3 build-essential pkg-config fontconfig libfontconfig1 libfontconfig-dev libfreetype-dev libpng-dev zlib1g-dev"

          run_cmd "rm -rf /root/SkiaSharp"
          run_cmd "git clone --recursive https://github.com/mono/SkiaSharp.git /root/SkiaSharp"
          run_cmd "cd /root/SkiaSharp && git checkout $skiasharp_ref && git submodule update --init --recursive"

          send -- "cd /root/SkiaSharp; cat >/tmp/build-skiasharp.sh <<'SCRIPT'\nset +e\nset -o pipefail\nexport CFLAGS=\"\${CFLAGS:-} -DPNG_LOONGARCH_LSX_OPT=0\"\nexport CXXFLAGS=\"\${CXXFLAGS:-} -DPNG_LOONGARCH_LSX_OPT=0\"\nexport CPPFLAGS=\"\${CPPFLAGS:-} -DPNG_LOONGARCH_LSX_OPT=0\"\nbash -x build.sh --variant=debian --buildarch=loongarch64 --target=externals-linux 2>&1 | tee /tmp/skiasharp-build.log\nrc=\$?\nmkdir -p /workspace/dist/skiasharp-loong64\nfind /root/SkiaSharp/output -type f \\( -name 'libSkiaSharp.so' -o -name 'libHarfBuzzSharp.so' \\) -exec cp -av {} /workspace/dist/skiasharp-loong64/ \\; 2>/dev/null || true\npatchelf --print-needed /workspace/dist/skiasharp-loong64/libSkiaSharp.so 2>/dev/null || true\ntar -C /workspace/dist -czf /workspace/dist/skiasharp-loong64-native.tar.gz skiasharp-loong64 2>/dev/null || true\necho __BUILD_DONE__\$rc\nSCRIPT\napt-get install -y patchelf || true\nbash /tmp/build-skiasharp.sh\r"

          expect {
            -re "__BUILD_DONE__0" {
              send -- "poweroff\r"
            }
            default {
              exit 1
            }
          }
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skiasharp-loong64-native
          path: dist/skiasharp-loong64-native.tar.gz
